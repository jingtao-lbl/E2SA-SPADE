name: e2sa-spade
channels:
  - conda-forge
dependencies:
  # Python runtime
  - python>=3.12
  - pip>=24

  # Core SPADE dependencies (schema, catalog, CLI, HTTP)
  - pydantic>=2.5
  - duckdb>=0.10
  - pyarrow>=15
  - pyyaml>=6
  - click>=8.1
  - requests>=2.31

  # Geospatial stack for harmonization
  - xarray>=2024.1
  - rioxarray>=0.15
  - rasterio>=1.3
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - matplotlib>=3.8

  # Dev / testing
  - pytest>=8

  # Pip-only packages (not on conda-forge or preferred from PyPI)
  - pip:
      - lancedb>=0.10
      - anthropic>=0.30
      - paper-search-mcp
